name: Sync uploaded media to assets repository

on:
  push:
    branches: [main]
    paths:
      - "public/uploads/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: media-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Collect and classify files
        id: collect
        shell: python
        run: |
          import json
          import os
          from collections import Counter
          from pathlib import Path

          site = Path("site")
          upload_dir = site / "public" / "uploads"
          exceptions = {"logo-mapsycoy-title.svg", "reverie.ogg"}
          files = sorted(path for path in upload_dir.iterdir() if path.is_file() and path.name not in exceptions)
          if not files:
            with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write("has_files=false\n")
            raise SystemExit

          text_files = []
          for root in (site / "src", site / "public"):
            for path in root.rglob("*"):
              if not path.is_file() or path.parent == upload_dir:
                continue
              try:
                text_files.append((path, path.read_text(encoding="utf-8")))
              except UnicodeDecodeError:
                pass

          manifest = {}
          priority = {"blog": 0, "works": 1, "cv": 2, "site": 3}
          for media in files:
            counts = Counter()
            needle = f"/uploads/{media.name}"
            for path, text in text_files:
              occurrences = text.count(needle)
              if not occurrences:
                continue
              relative = path.relative_to(site).as_posix()
              if relative.startswith("src/content/blog/"):
                category = "blog"
              elif relative.startswith("src/content/works/"):
                category = "works"
              elif relative == "src/data/cv.json":
                category = "cv"
              else:
                category = "site"
              counts[category] += occurrences
            if counts:
              category = sorted(counts, key=lambda item: (-counts[item], priority[item]))[0]
              if len(counts) > 1:
                print(f"::warning file={media.as_posix()}::Multiple categories {dict(counts)}; selected {category}")
            else:
              category = "misc"
              print(f"::warning file={media.as_posix()}::No content references; classified as misc")
            manifest[media.name] = category

          manifest_path = Path(os.environ["RUNNER_TEMP"]) / "media-manifest.json"
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding="utf-8")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
            output.write("has_files=true\n")

      - name: Checkout assets
        if: steps.collect.outputs.has_files == 'true'
        uses: actions/checkout@v4
        with:
          repository: mapsycoy/mapsycoy-assets
          path: assets
          token: ${{ secrets.MEDIA_SYNC_TOKEN }}

      - name: Copy classified files to assets
        if: steps.collect.outputs.has_files == 'true'
        shell: python
        run: |
          import json
          import os
          import shutil
          from pathlib import Path

          manifest = json.loads((Path(os.environ["RUNNER_TEMP"]) / "media-manifest.json").read_text(encoding="utf-8"))
          for name, category in manifest.items():
            destination = Path("assets/uploads") / category / name
            destination.parent.mkdir(parents=True, exist_ok=True)
            shutil.copy2(Path("site/public/uploads") / name, destination)

      - name: Commit assets
        if: steps.collect.outputs.has_files == 'true'
        id: assets
        working-directory: assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uploads
          if ! git diff --cached --quiet; then
            git commit -m "Sync uploaded site media"
            git push
          fi
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Replace references and remove migrated files
        if: steps.collect.outputs.has_files == 'true'
        env:
          ASSET_SHA: ${{ steps.assets.outputs.sha }}
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          site = Path("site")
          upload_dir = site / "public" / "uploads"
          manifest = json.loads((Path(os.environ["RUNNER_TEMP"]) / "media-manifest.json").read_text(encoding="utf-8"))
          for root in (site / "src", site / "public"):
            for path in root.rglob("*"):
              if not path.is_file() or path.parent == upload_dir:
                continue
              try:
                text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                continue
              updated = text
              for name, category in manifest.items():
                local = f"/uploads/{name}"
                cdn = f"https://cdn.jsdelivr.net/gh/mapsycoy/mapsycoy-assets@{os.environ['ASSET_SHA']}/uploads/{category}/{name}"
                updated = updated.replace(local, cdn)
              if updated != text:
                path.write_text(updated, encoding="utf-8")
          for name in manifest:
            (upload_dir / name).unlink()

      - name: Commit site updates
        if: steps.collect.outputs.has_files == 'true'
        working-directory: site
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src public
          if ! git diff --cached --quiet; then
            git commit -m "Migrate uploaded media to assets [skip ci]"
            git push
          fi
