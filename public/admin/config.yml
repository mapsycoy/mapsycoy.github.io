backend:
  name: git-gateway
  repo: mapsycoy/mapsycoy.github.io
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/056ae6a2-d6e4-4286-9229-7704c0f6137a/pkce
  auth_token_endpoint: /sites/056ae6a2-d6e4-4286-9229-7704c0f6137a/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: "Create {{collection}} {{slug}} - {{author-name}} <{{author-login}}> via DecapBridge"
    update: "Update {{collection}} {{slug}} - {{author-name}} <{{author-login}}> via DecapBridge"
    delete: "Delete {{collection}} {{slug}} - {{author-name}} <{{author-login}}> via DecapBridge"
    uploadMedia: "Upload {{path}} - {{author-name}} <{{author-login}}> via DecapBridge"
    deleteMedia: "Delete {{path}} - {{author-name}} <{{author-login}}> via DecapBridge"
    openAuthoring: "Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge"

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

site_url: https://mapsycoy.github.io
display_url: https://mapsycoy.github.io
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
logo:
  src: /logo/mapsycoy-title.svg
  show_in_header: true

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: blog
    label: Blog
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: blog/{{slug}}
    summary: "{{title}} - {{publishedAt}}"
    sortable_fields:
      - title
      - publishedAt
      - tag
      - status
    view_filters:
      - label: Published
        field: status
        pattern: published
      - label: Drafts
        field: status
        pattern: draft
    fields:
      - label: Title
        name: title
        widget: string
      - label: Published Date
        name: publishedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Updated Date
        name: updatedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: false
      - label: Status
        name: status
        widget: select
        default: published
        options:
          - label: Published
            value: published
          - label: Draft
            value: draft
      - label: Pinned
        name: pinned
        widget: boolean
        default: false
        required: false
        hint: Turn this on for one blog post to keep it at the top of the blog list.
      - label: Tag
        name: tag
        widget: select
        options:
          - Essay
          - AI
          - Paper
      - label: Thumbnail
        name: thumbnail
        widget: image
        required: false
      - label: Hero Image
        name: heroImage
        widget: image
        required: false
      - label: Hero Image Caption
        name: heroImageCaption
        widget: string
        required: false
      - label: Body
        name: body
        widget: markdown
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-one
          - heading-two
          - heading-three
          - heading-four
          - heading-five
          - heading-six
          - quote
          - bulleted-list
          - numbered-list
        editor_components:
          - captioned-image
          - table
          - divider
        hint: Use the Image component to add an image with a caption. Use the Table component to add a markdown table. Use <mark>text</mark> to highlight text inline. Uploaded files are stored in the shared uploads folder.

  - name: works
    label: Works
    label_singular: Work
    folder: src/content/works
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: works/{{slug}}
    summary: "{{title}} - {{year}}"
    sortable_fields:
      - title
      - year
      - status
      - workType
      - artistOrRole
      - venue
    view_filters:
      - label: Published
        field: status
        pattern: published
      - label: Drafts
        field: status
        pattern: draft
      - label: Independent
        field: workType
        pattern: independent
      - label: Collaborative
        field: workType
        pattern: collaborative
    fields:
      - label: Title
        name: title
        widget: string
      - label: Year
        name: year
        widget: string
      - label: Status
        name: status
        widget: select
        default: published
        options:
          - label: Published
            value: published
          - label: Draft
            value: draft
      - label: Work Type
        name: workType
        widget: select
        default: independent
        options:
          - label: Independent
            value: independent
          - label: Collaborative
            value: collaborative
      - label: Role / Artist
        name: artistOrRole
        widget: string
        required: false
      - label: Venue
        name: venue
        widget: string
        required: false
      - label: Content Blocks
        name: contentBlocks
        widget: list
        required: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.type}}"
        types:
          - label: Text
            name: text
            widget: object
            fields:
              - label: Body
                name: body
                widget: markdown
                buttons:
                  - bold
                  - italic
                  - code
                  - link
                  - heading-one
                  - heading-two
                  - heading-three
                  - heading-four
                  - heading-five
                  - heading-six
                  - quote
                  - bulleted-list
                  - numbered-list
                editor_components:
                  - captioned-image
                  - image-grid
                  - divider
          - label: Video
            name: video
            widget: object
            fields:
              - label: Video Embed
                name: embed
                widget: text
                hint: Paste a YouTube/Vimeo URL or iframe embed code.
              - label: Caption
                name: caption
                widget: string
                required: false
          - label: Embed
            name: embed
            widget: object
            summary: "{{fields.provider}}"
            fields:
              - label: Provider
                name: provider
                widget: select
                default: x
                options:
                  - label: X Post
                    value: x
                  - label: Reddit Post
                    value: reddit
              - label: Embed Code
                name: embedCode
                widget: text
                hint: Paste the official embed HTML. Script tags are handled by the site and can be left in or removed.
              - label: Caption
                name: caption
                widget: string
                required: false
          - label: Stats Link
            name: statsLink
            widget: object
            summary: "{{fields.title}}"
            fields:
              - label: Title
                name: title
                widget: string
                hint: Name of the external profile, project, or platform page.
              - label: Subtitle
                name: subtitle
                widget: string
                required: false
                hint: Optional context, such as @username on GIPHY.
              - label: URL
                name: url
                widget: string
              - label: Button Label
                name: ctaLabel
                widget: string
                default: View link
                required: false
              - label: Stats
                name: stats
                widget: list
                collapsed: false
                minimize_collapsed: true
                summary: "{{fields.value}} {{fields.label}}"
                fields:
                  - label: Value
                    name: value
                    widget: string
                    hint: Example values - 191.8M, 24, 1.2K
                  - label: Label
                    name: label
                    widget: string
                    hint: Example labels - GIF Views, Uploads, Followers
      - label: Tags
        name: tags
        widget: list
        collapsed: false
        minimize_collapsed: true
        summary: "{{fields.tag}}"
        field:
          label: Tag
          name: tag
          widget: string
      - label: Thumbnail
        name: thumbnail
        widget: image
      - label: Hero Image
        name: heroImage
        widget: image
        required: false
      - label: Hero Image Display
        name: heroImageDisplay
        widget: select
        default: full
        required: false
        options:
          - label: Full width
            value: full
          - label: Contained
            value: contained
        hint: Use Contained for small GIFs, stickers, or transparent images that should not be enlarged to full page width.
      - label: Hero Image Caption
        name: heroImageCaption
        widget: string
        required: false

  - name: settings
    label: Settings
    files:
      - label: CV
        name: cv
        file: src/data/cv.json
        format: json
        fields:
          - label: Profile
            name: profile
            widget: object
            fields:
              - label: Name
                name: name
                widget: string
              - label: Location
                name: location
                widget: string
                required: false
              - label: Photo
                name: photo
                widget: string
                required: false
          - label: Education
            name: education
            widget: list
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.degree}}"
            fields:
              - label: Institution
                name: institution
                widget: string
                required: false
              - label: Degree
                name: degree
                widget: string
              - label: Period
                name: period
                widget: string
              - label: Description
                name: description
                widget: list
                required: false
                field:
                  label: Line
                  name: line
                  widget: string
          - label: Arts Gifted Education Certificate
            name: artsGiftedEducationCertificate
            widget: object
            fields:
              - label: Title
                name: title
                widget: string
              - label: Logos
                name: logos
                widget: list
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.alt}}"
                fields:
                  - label: Source
                    name: src
                    widget: string
                  - label: Alt
                    name: alt
                    widget: string
          - label: Experiences
            name: experiences
            widget: list
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.role}}"
            fields:
              - label: Role
                name: role
                widget: string
              - label: Team
                name: team
                widget: string
                required: false
                hint: Optional team name shown after the role.
              - label: Organization
                name: organization
                widget: string
              - label: Employment Type
                name: employmentType
                widget: string
                required: false
              - label: Period
                name: period
                widget: string
              - label: Duration
                name: duration
                widget: string
                required: false
              - label: Logo
                name: logo
                widget: string
                required: false
              - label: Description
                name: description
                widget: list
                required: false
                field:
                  label: Line
                  name: line
                  widget: string
              - label: Sub Entries
                name: subEntries
                widget: list
                required: false
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - label: Title
                    name: title
                    widget: string
                  - label: Period
                    name: period
                    widget: string
                  - label: Duration
                    name: duration
                    widget: string
                    required: false
                  - label: Description
                    name: description
                    widget: list
                    required: false
                    field:
                      label: Line
                      name: line
                      widget: string
              - label: Media
                name: media
                widget: list
                required: false
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.label}}"
                fields:
                  - label: Type
                    name: type
                    widget: select
                    default: image
                    options:
                      - image
                      - link
                  - label: Source
                    name: src
                    widget: string
                    required: false
                  - label: URL
                    name: href
                    widget: string
                    required: false
                  - label: Alt
                    name: alt
                    widget: string
                    required: false
                  - label: Label
                    name: label
                    widget: string
                    required: false
          - label: Projects
            name: projects
            widget: list
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - label: Title
                name: title
                widget: string
              - label: Period
                name: period
                widget: string
              - label: Description
                name: description
                widget: list
                required: false
                field:
                  label: Line
                  name: line
                  widget: string
              - label: Media
                name: media
                widget: list
                required: false
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.label}}"
                fields:
                  - label: Type
                    name: type
                    widget: select
                    default: image
                    options:
                      - image
                      - link
                  - label: Source
                    name: src
                    widget: string
                    required: false
                  - label: URL
                    name: href
                    widget: string
                    required: false
                  - label: Alt
                    name: alt
                    widget: string
                    required: false
                  - label: Label
                    name: label
                    widget: string
                    required: false
              - label: Links
                name: links
                widget: list
                required: false
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.label}}"
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: URL
                    name: href
                    widget: string
      - label: Works Order
        name: worksOrder
        file: src/data/works-order.json
        format: json
        fields:
          - label: Collaborative Works Order
            name: collaborative
            widget: list
            collapsed: false
            minimize_collapsed: false
            summary: "{{fields.work}}"
            hint: Drag the blocks to change the order within the Collaborative section.
            fields:
              - label: Work
                name: work
                widget: relation
                collection: works
                search_fields:
                  - title
                  - year
                value_field: "{{slug}}"
                display_fields:
                  - title
                  - year
          - label: Independent Works Order
            name: independent
            widget: list
            collapsed: false
            minimize_collapsed: false
            summary: "{{fields.work}}"
            hint: Drag the blocks to change the order within the Independent section.
            fields:
              - label: Work
                name: work
                widget: relation
                collection: works
                search_fields:
                  - title
                  - year
                value_field: "{{slug}}"
                display_fields:
                  - title
                  - year
