backend:
  name: git-gateway
  repo: mapsycoy/mapsycoy.github.io
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/056ae6a2-d6e4-4286-9229-7704c0f6137a/pkce
  auth_token_endpoint: /sites/056ae6a2-d6e4-4286-9229-7704c0f6137a/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: "Create {{collection}} {{slug}} - {{author-name}} <{{author-login}}> via DecapBridge"
    update: "Update {{collection}} {{slug}} - {{author-name}} <{{author-login}}> via DecapBridge"
    delete: "Delete {{collection}} {{slug}} - {{author-name}} <{{author-login}}> via DecapBridge"
    uploadMedia: "Upload {{path}} - {{author-name}} <{{author-login}}> via DecapBridge"
    deleteMedia: "Delete {{path}} - {{author-name}} <{{author-login}}> via DecapBridge"
    openAuthoring: "Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge"

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

local_backend: true

site_url: https://mapsycoy.github.io
display_url: https://mapsycoy.github.io
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
logo:
  src: /logo/mapsycoy-title.svg
  show_in_header: true

media_folder: public/uploads
public_folder: /uploads

slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: blog
    label: Blog
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    preview_path: blog/{{slug}}
    summary: "{{title.en}} - {{publishedAt}}"
    sortable_fields:
      - title
      - publishedAt
      - tag
      - status
    view_filters:
      - label: Published
        field: status
        pattern: published
      - label: Drafts
        field: status
        pattern: draft
    fields:
      - label: Title
        name: title
        widget: object
        required: false
        fields:
          - label: Korean
            name: ko
            widget: string
            required: false
          - label: English
            name: en
            widget: string
            required: false
      - label: Published Date
        name: publishedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Updated Date
        name: updatedAt
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
        required: false
      - label: Status
        name: status
        widget: select
        default: published
        options:
          - label: Published
            value: published
          - label: Draft
            value: draft
      - label: Pinned
        name: pinned
        widget: boolean
        default: false
        required: false
        hint: Turn this on for one blog post to keep it at the top of the blog list.
      - label: Tag
        name: tag
        widget: select
        options:
          - Essay
          - AI
          - Paper
      - label: Thumbnail
        name: thumbnail
        widget: image
        required: false
      - label: Hero Image
        name: heroImage
        widget: image
        required: false
      - label: Hero Image Caption
        name: heroImageCaption
        widget: object
        required: false
        fields:
          - label: Korean
            name: ko
            widget: string
            required: false
          - label: English
            name: en
            widget: string
            required: false
      - label: Content Blocks
        name: contentBlocks
        widget: list
        required: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.type}}"
        types:
          - label: Text
            name: text
            widget: object
            fields:
              - label: Body
                name: body
                widget: object
                fields:
                  - label: Korean
                    name: ko
                    widget: markdown
                    required: false
                    buttons:
                      - bold
                      - italic
                      - code
                      - link
                      - heading-one
                      - heading-two
                      - heading-three
                      - quote
                      - bulleted-list
                      - numbered-list
                    editor_components:
                      - captioned-image
                      - divider
                  - label: English
                    name: en
                    widget: markdown
                    required: false
                    buttons:
                      - bold
                      - italic
                      - code
                      - link
                      - heading-one
                      - heading-two
                      - heading-three
                      - quote
                      - bulleted-list
                      - numbered-list
